<!DOCTYPE html> 
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Detalle Producto
    </title>

    <link rel="stylesheet" href="css/detalle.css">
</head>

<body>

    <div class="container">

        <div class="breadcrumb">

            Home / Categoría / Producto

        </div>

        <section class="product-box">

            <div class="left-side">

                <img id="productImage">

            </div>

            <div class="right-side">

                <p class="category" id="productCategory">
                </p>

                <h1 class="title" id="productTitle">
                </h1>

                <div class="rating">

                    ⭐ 4.8 <span id="productReviews"></span>

                </div>

                <p class="description" id="productDescription">
                </p>

                <div class="info-grid">

                    <div class="info-card" id="productBrand">
                       Marca
                    </div>

                    <div class="info-card" id="productStock">
                        Stock 
                    </div>

                    <div class="info-card" id="productShipping">
                        Envío 
                    </div>

                    <div class="info-card" id="productSKU">
                       SKU
                    </div>

                </div>

                <div class="price" id="productPrice">
                </div>

                <div class="actions">

                    <button class="buy-btn" id="addToCartBtn">
                        Añadir al carrito
                    </button>

                    <button class="fav-btn" id="favoriteBtn">
                        ❤️
                    </button>

                </div>

            </div>

        </section>

        <section class="related">

            <h2>
                Productos relacionados
            </h2>

            <div class="related-grid" id="relatedGrid">
            </div>

        </section>

    </div>

    <script src="js/detalle.js"></script>

</body>

</html>
